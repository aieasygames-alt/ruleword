<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, shrink-to-fit=no">
    <meta http-equiv="x-ua-compatible" content="ie=edge">
    <title>Among Us - RuleWord Games</title>
    <link href="assets/Image/logo.png" rel="icon">
    <link rel="stylesheet" type="text/css" href="assets/Css/style3.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }
        .game-container {
            text-align: center;
            padding: 20px;
        }
        .game-title {
            font-size: 3rem;
            color: #fff;
            text-shadow: 0 0 20px rgba(255, 107, 107, 0.8);
            margin-bottom: 30px;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        .banner {
            max-width: 400px;
            width: 100%;
            margin-bottom: 40px;
            filter: drop-shadow(0 10px 30px rgba(0,0,0,0.5));
        }
        .menu-buttons {
            display: flex;
            flex-direction: column;
            gap: 20px;
            align-items: center;
        }
        .menu-btn {
            padding: 20px 50px;
            font-size: 1.2rem;
            font-weight: bold;
            color: #fff;
            background: linear-gradient(135deg, #ff6b6b, #ee5a24);
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 30px rgba(238, 90, 36, 0.4);
            min-width: 280px;
        }
        .menu-btn:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(238, 90, 36, 0.6);
        }
        .menu-btn:active {
            transform: translateY(-2px);
        }
        .menu-btn.secondary {
            background: linear-gradient(135deg, #4834d4, #686de0);
            box-shadow: 0 10px 30px rgba(72, 52, 212, 0.4);
        }
        .menu-btn.secondary:hover {
            box-shadow: 0 15px 40px rgba(72, 52, 212, 0.6);
        }
        .back-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            padding: 15px 25px;
            font-size: 1rem;
            color: #fff;
            background: rgba(255,255,255,0.1);
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
            z-index: 1000;
        }
        .back-btn:hover {
            background: rgba(255,255,255,0.2);
            border-color: rgba(255,255,255,0.5);
        }
        .hidden {
            display: none !important;
        }
        #gameFrame {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }
        .instructions {
            margin-top: 30px;
            color: rgba(255,255,255,0.7);
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <!-- Main Menu -->
    <div id="mainMenu" class="game-container">
        <h1 class="game-title">Among Us</h1>
        <img src="assets/Image/banner.png" alt="Among Us" class="banner">
        <div class="menu-buttons">
            <button class="menu-btn" onclick="startGame('mini')">
                🎮 Mini Game
            </button>
            <button class="menu-btn secondary" onclick="startGame('move')">
                👽 Character Move
            </button>
        </div>
        <p class="instructions">
            Use Arrow Keys or WASD to move | Click Kill/Sabotage buttons for actions
        </p>
    </div>

    <!-- Game Frame -->
    <iframe id="gameFrame" class="hidden"></iframe>
    <button id="backBtn" class="back-btn hidden" onclick="goBack()">← Back to Menu</button>

    <script>
        function startGame(mode) {
            var mainMenu = document.getElementById('mainMenu');
            var gameFrame = document.getElementById('gameFrame');
            var backBtn = document.getElementById('backBtn');

            mainMenu.classList.add('hidden');
            gameFrame.classList.remove('hidden');
            backBtn.classList.remove('hidden');

            if (mode === 'mini') {
                gameFrame.src = 'amongus.html';
            } else {
                gameFrame.src = 'amongusmove.html';
            }
        }

        function goBack() {
            var mainMenu = document.getElementById('mainMenu');
            var gameFrame = document.getElementById('gameFrame');
            var backBtn = document.getElementById('backBtn');

            gameFrame.src = '';
            gameFrame.classList.add('hidden');
            backBtn.classList.add('hidden');
            mainMenu.classList.remove('hidden');
        }

        // Listen for escape key to go back
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                var gameFrame = document.getElementById('gameFrame');
                if (!gameFrame.classList.contains('hidden')) {
                    goBack();
                }
            }
        });
    </script>
</body>
</html>
