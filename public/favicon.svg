<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e293b"/>
      <stop offset="100%" style="stop-color:#0f172a"/>
    </linearGradient>
    <linearGradient id="letter" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4ade80"/>
      <stop offset="100%" style="stop-color:#22c55e"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="100" fill="url(#bg)"/>
  <!-- Letter R -->
  <text x="256" y="340" font-family="Arial, sans-serif" font-size="280" font-weight="bold" fill="url(#letter)" text-anchor="middle">R</text>
  <!-- Decorative grid pattern -->
  <rect x="80" y="400" width="60" height="60" rx="8" fill="#22c55e" opacity="0.3"/>
  <rect x="150" y="400" width="60" height="60" rx="8" fill="#eab308" opacity="0.3"/>
  <rect x="220" y="400" width="60" height="60" rx="8" fill="#6b7280" opacity="0.3"/>
</svg>
