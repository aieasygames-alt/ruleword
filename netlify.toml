[build]
  command = "cd astro-app && pnpm install && pnpm run build"
  publish = "astro-app/dist"
  base = "/"

[build.environment]
  NODE_VERSION = "20"
  NPM_FLAGS = "--shamefully-hoist"

# Netlify Identity 支持 - Admin 路由
[[redirects]]
  from = "/admin"
  to = "/admin/index.html"
  status = 200
  force = false

[[redirects]]
  from = "/admin/*"
  to = "/admin/:splat"
  status = 200
  force = false

# 安全 Headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# 缓存 Headers
[[headers]]
  for = "/_astro/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Netlify Identity CORS 支持
[[headers]]
  for = "/admin/*"
  [headers.values]
    Access-Control-Allow-Origin = "*"
